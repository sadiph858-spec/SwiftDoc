name: Build LeafPDF APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK (capture full log)
        id: build
        continue-on-error: true
        run: |
          set +e
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle_full.log
          echo "BUILD_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV
          set -e

      - name: Save error log via API
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get last 200 lines of gradle output
          tail -200 /tmp/gradle_full.log > /tmp/gradle_tail.log
          # Encode to base64
          B64=$(base64 -w 0 /tmp/gradle_tail.log)
          # Check if file exists in repo
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/ci_build_log.txt" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")
          
          if [ -n "$SHA" ]; then
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/ci_build_log.txt" \
              -d "{\"message\":\"CI log\",\"content\":\"$B64\",\"sha\":\"$SHA\"}"
          else
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/ci_build_log.txt" \
              -d "{\"message\":\"CI log\",\"content\":\"$B64\"}"
          fi
          echo "Log saved to repo"

      - name: Upload APK if build succeeded
        if: env.BUILD_EXIT == '0'
        uses: actions/upload-artifact@v4
        with:
          name: LeafPDF-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release if build succeeded
        if: env.BUILD_EXIT == '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-debug
          name: LeafPDF Debug APK
          body: "LeafPDF - Smart PDF Reader"
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
