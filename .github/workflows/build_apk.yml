name: Build SwiftDoc Signed Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > app/swiftdoc-release.keystore

      - name: Build Signed Release APK
        env:
          KEYSTORE_PATH: swiftdoc-release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --no-build-cache

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk dist/SwiftDoc-v3.0-signed.apk
          ls -lh dist/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftDoc-v3-signed
          path: dist/SwiftDoc-v3.0-signed.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0-release
          name: "SwiftDoc v3.0 — Final Signed Release"
          body: |
            ## SwiftDoc v3.0 — Complete PDF Utility
            **Package:** `com.swiftdoc.pdf22449`
            
            ### New in v3.0:
            - 📷 Scan to PDF with auto-deskew & auto-crop
            - ✂️ PDF Crop (drag handles + auto-detect)
            - ⚡ 100× faster PDF loading (native Android GPU)
            - 🔄 Auto-straighten skewed scanned images
            
            ### All 25+ Features:
            View, Scan, Crop, Image→PDF (5 filters), PDF→Images,
            Compress, Split, Lock/Unlock, Watermark, Rotate, Text→PDF,
            OCR, Bookmarks, Reading Modes, Auto-resume, Statistics,
            Dark Mode, Print, Share, Grid/List view
            
            **Signed:** RSA 2048-bit | Valid 27 years
            **Install:** Settings → Unknown Sources → Install
          files: dist/SwiftDoc-v3.0-signed.apk
          make_latest: true
