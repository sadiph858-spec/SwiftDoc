name: Build LeafPDF APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tee gradle_out.txt; echo "EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV
      - name: Save log to repo
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          B64=$(tail -200 gradle_out.txt | base64 -w 0)
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/${{ github.repository }}/contents/ci_build_log.txt" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")
          if [ -n "$SHA" ]; then
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/${{ github.repository }}/contents/ci_build_log.txt" -d "{\"message\":\"CI log\",\"content\":\"$B64\",\"sha\":\"$SHA\"}" > /dev/null
          else
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/${{ github.repository }}/contents/ci_build_log.txt" -d "{\"message\":\"CI log\",\"content\":\"$B64\"}" > /dev/null
          fi
      - name: Upload APK
        if: env.EXIT == '0'
        uses: actions/upload-artifact@v4
        with:
          name: LeafPDF-v2-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      - name: Create Release
        if: env.EXIT == '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0-debug
          name: LeafPDF v2.0 - 25+ Features
          body: |
            ## 🍃 LeafPDF v2.0
            **25+ Premium Features:**
            - Privacy Policy consent flow
            - Image to PDF with 5 filters
            - Compress, Split, Lock/Unlock, Watermark, Rotate PDF
            - Text to PDF, PDF to Images
            - Bookmarks, Auto-scroll, Reading modes
            - Statistics dashboard
            - AdMob ready (hidden until configured)
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
