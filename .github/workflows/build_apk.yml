name: Build LeafPDF APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew
      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK
        id: gradle_build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --no-daemon --no-build-cache 2>&1 | tee /tmp/gradle.log
          echo "GRADLE_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Print last 60 lines of build log
        if: always()
        run: tail -60 /tmp/gradle.log

      - name: Push build log to repo
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          B64=$(tail -250 /tmp/gradle.log | base64 -w 0)
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/ci_build_log.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
          if [ -n "$SHA" ]; then
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/ci_build_log.txt" \
              -d "{\"message\":\"CI log $(date +%H%M%S)\",\"content\":\"$B64\",\"sha\":\"$SHA\"}" > /dev/null
          else
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/ci_build_log.txt" \
              -d "{\"message\":\"CI log $(date +%H%M%S)\",\"content\":\"$B64\"}" > /dev/null
          fi
          echo "Log pushed"

      - name: Upload APK
        if: success() && env.GRADLE_EXIT == '0'
        uses: actions/upload-artifact@v4
        with:
          name: LeafPDF-v2-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: success() && env.GRADLE_EXIT == '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0-debug
          name: "LeafPDF v2.0 - 25+ Features"
          body: "LeafPDF v2.0 complete PDF utility with 25+ features"
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
