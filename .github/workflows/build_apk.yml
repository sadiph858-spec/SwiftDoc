name: Build SwiftDoc Signed Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > app/swiftdoc-release.keystore
          ls -lh app/swiftdoc-release.keystore

      - name: Build Signed Release APK
        env:
          KEYSTORE_PATH: swiftdoc-release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --no-build-cache

      - name: Find APK
        run: |
          echo "=== All APK files ==="
          find . -name "*.apk" -ls
          echo "=== Build outputs ==="
          find app/build/outputs -type f 2>/dev/null || echo "No build outputs dir"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftDoc-v3-signed-release
          path: "**/*.apk"
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0-release
          name: "🚀 SwiftDoc v3.0 — Signed Release"
          body: |
            ## SwiftDoc v3.0
            **Package:** com.swiftdoc.pdf22449
            
            ### ✨ New Features:
            - 📷 Scan to PDF (auto-deskew + auto-crop)
            - ✂️ PDF Crop (interactive handles + auto-crop)  
            - ⚡ 100× faster PDF loading (native GPU)
            - 🔄 Auto-straighten skewed images
            
            ### All 25+ Features included
            **Signed:** RSA 2048-bit keystore, valid 27 years
          files: "**/*.apk"
          make_latest: true
