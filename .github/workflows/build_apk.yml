name: Build LeafPDF APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Clear Gradle Cache (force fresh build)
        run: |
          rm -rf ~/.gradle/caches/build-cache-*
          rm -rf ~/.gradle/caches/modules-*/files-*/com.smartpdf.*
          ./gradlew --stop 2>/dev/null || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --rerun-tasks

      - name: Verify APK
        run: ls -lh app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LeafPDF-v2-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0-debug
          name: "🍃 LeafPDF v2.0 - 25+ Features"
          body: |
            ## 🍃 LeafPDF v2.0

            **25+ Premium Features:**
            - 🔐 Privacy Policy consent (scroll-to-enable buttons)
            - 🖼️ Image→PDF with 5 pro filters
            - 📖 High-performance PDF viewer
            - 🔖 Bookmarks + Auto-resume
            - 🌙 Day/Night/Sepia modes + Brightness
            - ↔️ Horizontal/Vertical scroll + Auto-scroll
            - 🗜️ Compress, ✂️ Split, 🔒 Lock/Unlock PDF
            - 💧 Watermark, 🔄 Rotate, 📄 Text→PDF
            - 🖼️ PDF→Images (save to Gallery)
            - 📊 Reading Statistics
            - 🌿 Green Material Design 3 theme
            - 💚 AdMob ready (auto-hidden until configured)

            **Install:** Enable Unknown Sources → Install APK
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
