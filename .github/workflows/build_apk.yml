name: Build LeafPDF APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK
        continue-on-error: true
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tee gradle_output.txt

      - name: Commit build log to repo
        run: |
          git config user.email "ci@github.com"
          git config user.name "CI Bot"
          cp gradle_output.txt build_log_latest.txt
          git add build_log_latest.txt
          git commit -m "CI: build log [skip ci]"
          git push
