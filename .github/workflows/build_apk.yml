name: Build LeafPDF APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK
        id: build
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build_output.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "exit_code=$BUILD_EXIT" >> $GITHUB_OUTPUT
          if [ $BUILD_EXIT -eq 0 ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
            # Commit the error log so we can read it
            git config user.email "ci@github.com"
            git config user.name "CI Bot"
            tail -150 build_output.log > build_error.txt
            git add build_error.txt
            git commit -m "CI: save build error log" || true
            git push || true
          fi

      - name: Create GitHub Release with APK
        if: env.BUILD_SUCCESS == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-debug
          name: LeafPDF Debug APK
          body: "LeafPDF Android App - Debug Build"
          files: app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Artifact
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: LeafPDF-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
