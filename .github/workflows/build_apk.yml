name: Build LeafPDF APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # NO cache - force fresh every time

      - uses: android-actions/setup-android@v3

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK (no cache)
        run: ./gradlew assembleDebug --no-daemon --no-build-cache --rerun-tasks

      - name: Verify APK
        run: ls -lh app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LeafPDF-v2-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0-debug
          name: "LeafPDF v2.0 - 25+ Features"
          body: |
            LeafPDF v2.0 - Complete Android PDF Utility

            Features: Privacy Policy, Image-to-PDF (5 filters), PDF Viewer,
            Bookmarks, Reading modes, Compress/Split/Lock/Unlock/Watermark/Rotate,
            Text-to-PDF, PDF-to-Images, Stats, Dark Mode, AdMob ready.
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
