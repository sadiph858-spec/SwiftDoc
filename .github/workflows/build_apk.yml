name: Build LeafPDF Signed Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew
      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > app/leafpdf-release.keystore
          echo "Keystore decoded: $(ls -lh app/leafpdf-release.keystore)"

      - name: Build Release APK (Signed)
        env:
          KEYSTORE_PATH: leafpdf-release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon --no-build-cache 2>&1 | tee /tmp/gradle.log
          echo "Build exit: ${PIPESTATUS[0]}"

      - name: Save log on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          B64=$(tail -200 /tmp/gradle.log | base64 -w 0)
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/ci_build_log.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
          if [ -n "$SHA" ]; then
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/ci_build_log.txt" \
              -d "{\"message\":\"CI log\",\"content\":\"$B64\",\"sha\":\"$SHA\"}" > /dev/null
          else
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/ci_build_log.txt" \
              -d "{\"message\":\"CI log\",\"content\":\"$B64\"}" > /dev/null
          fi

      - name: Verify Signed APK
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          ls -lh $APK_PATH
          echo "APK size: $(du -sh $APK_PATH | cut -f1)"

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LeafPDF-v2-release-signed
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0-release
          name: "LeafPDF v2.0 - Signed Release"
          body: |
            ## LeafPDF v2.0 - Signed Release APK
            
            **Ready for Play Store upload!**
            
            Signed with:
            - Key alias: leafpdf
            - Validity: 10,000 days (~27 years)
            - Algorithm: RSA 2048-bit
            
            Features: 25+ PDF tools, Privacy Policy, Image-to-PDF,
            Fast PDF viewer, Bookmarks, Dark mode, AdMob ready.
            
            Install: Enable Unknown Sources -> Install APK
          files: app/build/outputs/apk/release/app-release.apk
          make_latest: true
