name: Build SwiftDoc Signed Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > app/swiftdoc-release.keystore
          echo "Keystore decoded OK"
      - name: Build Signed Release APK
        env:
          KEYSTORE_PATH: swiftdoc-release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --no-build-cache 2>&1 | tee /tmp/gradle.log
      - name: Save log on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          B64=$(tail -200 /tmp/gradle.log | base64 -w 0)
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/ci_log.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
          if [ -n "$SHA" ]; then
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/ci_log.txt" \
              -d "{\"message\":\"CI log\",\"content\":\"$B64\",\"sha\":\"$SHA\"}" > /dev/null
          else
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/ci_log.txt" \
              -d "{\"message\":\"CI log\",\"content\":\"$B64\"}" > /dev/null
          fi
      - name: Verify APK
        run: ls -lh app/build/outputs/apk/release/app-release.apk
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftDoc-v3-signed-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0-release
          name: "SwiftDoc v3.0 - Signed Release"
          body: |
            ## SwiftDoc v3.0 — Complete PDF Utility
            Package: com.swiftdoc.pdf22449
            
            **New in v3.0:**
            - 📷 Scan to PDF (camera + auto-deskew + auto-crop)
            - ✂️ PDF Crop (interactive + auto-crop)
            - ⚡ 100x faster PDF loading (native GPU renderer)
            - 🔄 Auto-straighten scanned images
            - 🎨 Refreshed SwiftDoc green UI
            
            **All Features:**
            - View PDF, Image→PDF (5 filters), PDF→Images
            - Compress, Split, Lock/Unlock, Watermark, Rotate
            - Text→PDF, Bookmarks, Auto-resume
            - Day/Night/Sepia modes, Brightness control
            - Statistics, Dark Mode, Print, Share
            - AdMob ready (hidden until configured)
            
            **Signed:** RSA 2048-bit, 10,000 days validity
            **Install:** Enable Unknown Sources → Install APK
          files: app/build/outputs/apk/release/app-release.apk
          make_latest: true
